[mypy]
python_version = 3.12
# Source targets are supplied by local commands and CI so this config remains
# usable before JT-004 and JT-007 add Python modules to the scaffold.
mypy_path = .
namespace_packages = True
explicit_package_bases = True
strict = True
warn_unused_configs = True
warn_unreachable = True
show_error_codes = True
pretty = True
