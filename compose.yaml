services:
  database-init:
    image: alpine:3.22
    command:
      - sh
      - -c
      - |
        set -eu
        if [ ! -f /data/.docker-initialized ]; then
          if [ -f /source/jobtracker.sqlite3 ]; then
            cp /source/jobtracker.sqlite3 /data/jobtracker.sqlite3
          fi
          touch /data/.docker-initialized
        fi
    network_mode: none
    volumes:
      - ./:/source:ro
      - jobtracker-data:/data

  backend:
    build:
      context: ./backend
    depends_on:
      database-init:
        condition: service_completed_successfully
    environment:
      JOBTRACKER_API_HOST: 0.0.0.0
      JOBTRACKER_API_PORT: 8000
      JOBTRACKER_CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      JOBTRACKER_DATABASE_URL: sqlite+aiosqlite:////app/.jobtracker/jobtracker.sqlite3
      JOBTRACKER_DATA_DIR: /app/.jobtracker
      JOBTRACKER_FERNET_KEY_FILE: /app/.jobtracker/fernet.key
      JOBTRACKER_FRONTEND_URL: http://localhost:5173
      JOBTRACKER_SECRET_STORE_BACKEND: fernet
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "8000:8000"
    volumes:
      - jobtracker-data:/app/.jobtracker

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_BACKEND_URL: http://backend:8000
    ports:
      - "5173:5173"

volumes:
  jobtracker-data:
